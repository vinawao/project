name: Merge Playlists

on:
  push:
    branches: [main]
  schedule:
    # setiap 40 menit (ubah sesuai kebutuhan)
    - cron: '*/40 * * * *'
  workflow_dispatch: {}

concurrency:
  group: merge-playlists
  cancel-in-progress: true

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install requests urllib3; fi

      - name: Ensure playlists directory exists
        run: |
          if [ ! -d "playlists" ]; then echo "Warning: playlists/ directory not found"; fi

      - name: Run merge_event_filtered.py
        env:
          TZ: UTC
        run: |
          python merge_event_filtered.py --playlist-dir playlists --all --output events_merged_filt.m3u --offline-list offline.m3u --timeout 8 --workers 20 --retries 2

      - name: Upload merged playlist artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: events_merged_filt.m3u
          path: events_merged_filt.m3u

      - name: Upload offline playlist artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: offline.m3u
          path: offline.m3u
